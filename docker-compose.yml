services:
  network-tools:
    image: duyle95/network-tools:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: network-tools
    stdin_open: true
    tty: true
    cap_add:
      - NET_RAW  # needed for ping, traceroute, tcpdump, nmap
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    # Attach to external networks of the stack you want to debug.
    # Example: docker compose -p myapp up  → network name is "myapp_default"
    networks:
      - default

# To debug another compose stack's network, declare it as external:
# networks:
#   myapp_default:
#     external: true

networks:
  default: {}