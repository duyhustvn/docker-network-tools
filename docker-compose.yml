services:
  network-tools:
    image: network-tools:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: network-tools
    stdin_open: true
    tty: true
    cap_add:
      - NET_RAW  # needed for ping, traceroute, tcpdump, nmap
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
